<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="showName()">Click me</button>
    <h1 id="name"></h1>
</body>
<script>
    function showName() {
        var httrq = new XMLHttpRequest();
        httrq.onreadystatechange = function () {
            if (this.readyState == 4 && this.status == 200) {
                var xmlDoc = this.responseXML;
                var stud = xmlDoc.getElementsByTagName("student");
                var name = stud[0].getElementsByTagName("name")[0].textContent;
                document.getElementById("name").innerHTML = name;
            }
        }
        httrq.open("GET", "students.xml", true);
        httrq.send();
    }


</script>

</html>
