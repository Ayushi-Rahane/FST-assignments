<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Admin Panel</title>
    <!-- Importing Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header-container">
        <h1>Amazon</h1>
        <h3>Admin Console Setup</h3>
    </div>

    <div class="custom-select-wrapper">
        <select id="customer-select" onchange="fetchCustomerDetails()">
            <option value="">Select Customer to analyze</option>
            <option value="Chota Bheem">Chota Bheem</option>
            <option value="Rahul Gandhi">Rahul Gandhi</option>
            <option value="Narendra Modi">Narendra Modi</option>
            <option value="Super Man">Super Man</option>
        </select>
    </div>

    <div class="loader" id="loader"></div>

    <div class="card" id="customer-card">
        <!-- Header -->
        <div class="card-header">
            <img src="" alt="Customer Avatar" class="avatar" id="detail-image">
            <div class="header-info">
                <h2 id="detail-name">Name</h2>
                <div class="badge" id="detail-membership">Membership</div>
            </div>
        </div>

        <!-- Detail Grid -->
        <div class="info-grid">
            <!-- Email -->
            <div class="info-group">
                <span class="info-label">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                    </svg>
                    Email Address
                </span>
                <span class="info-value" id="detail-email">-</span>
            </div>

            <!-- Phone -->
            <div class="info-group">
                <span class="info-label">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
                    </svg>
                    Phone Number
                </span>
                <span class="info-value" id="detail-phone">-</span>
            </div>

            <!-- Full Shipping Address Block -->
            <div class="info-group full-width">
                <span class="info-label">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg>
                    Primary Shipping Address
                </span>
                <span class="info-value" id="detail-shipping">
                    <span id="detail-street" class="shipping-highlight">-</span><br>
                    <span id="detail-city-country">-</span>, <span id="detail-zip">-</span>
                </span>
            </div>
        </div>

        <!-- Order Analytics -->
        <div class="order-stats">
            <div class="stat-item">
                <div class="stat-value" id="detail-orders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="detail-lastorder">-</div>
                <div class="stat-label">Last Order Date</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
